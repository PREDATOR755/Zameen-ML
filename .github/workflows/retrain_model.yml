name: Retrain Model After Scraper

# Trigger: After the scraper workflow completes successfully
on:
  workflow_run:
    workflows: ["Zameen Weekly Data Pipeline"]
    types:
      - completed
  workflow_dispatch:   # Allow manual trigger

jobs:
  retrain:
    # Only run if the triggering workflow succeeded (and not on failure)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install ML Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn geopy joblib

      - name: 📦 Install Optional Model Libraries (if used)
        run: |
          pip install xgboost catboost optuna shap

      - name: 🧠 Run Training Script
        run: |
          python train.py

      - name: 💾 Commit and Push Updated Model Artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add rf_model.pkl encoders.pkl
          if git diff --quiet --staged; then
            echo "No model changes to commit."
          else
            git commit -m "🤖 Auto-retrain: Updated model from fresh data"
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded."
                break
              else
                echo "Push attempt $i failed. Waiting 5 seconds..."
                sleep 5
              fi
            done
          fi
