name: Zameen Weekly Data Pipeline

# Triggers: Run automatically every Sunday at midnight, OR manually via a button click
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v3
        
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml fake-useragent tqdm pandas

      - name: 🕷️ Run Zameen Scraper
        run: python scrapper
          
      - name: 💾 Commit and Push Updated Dataset (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add zameen_islamabad.csv
          # Check if there are changes to commit
          if git diff --quiet --staged; then
            echo "No changes to commit. Skipping commit/push."
          else
            git commit -m "🤖 Auto-update: Weekly Zameen property scrape"
            # Retry push up to 3 times (handles transient failures)
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded."
                break
              else
                echo "Push attempt $i failed. Waiting 5 seconds..."
                sleep 5
              fi
            done
          fi
